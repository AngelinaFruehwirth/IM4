<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Home</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Host+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <main class="app-page">
    <section class="home-screen">

      <div class="cloud-small">
        <img id="statusCloud" src="./resources/assets/Wolken_mittel.png" alt="Luftqualität Status">
      </div>

      <div class="room-select-wrapper">
        <select id="roomSelect" class="room-select">
          <option value="">Lädt Räume...</option>
        </select>
      </div>

      <h1 id="airValue" class="air-value">--</h1>

      <p class="air-label">Aktuelle Luftqualität</p>

      <div class="status-text">
        <p id="statusLabel" class="status-medium">Lädt...</p>
        <h2 id="statusMessage">Messwerte werden geladen.</h2>
      </div>

      <div class="metric-row">
        <div class="metric-box">
          <strong id="temperatureValue">--°</strong>
          <span>Aktuelle Temperatur</span>
        </div>

        <div class="metric-box">
          <strong id="humidityValue">--%</strong>
          <span>Aktuelle Luftfeuchtigkeit</span>
        </div>
      </div>

      <section class="chart-card">
        <h2>Tagesverlauf Luftqualität</h2>

        <div class="chart-placeholder">
          <canvas id="airChart"></canvas>
        </div>
      </section>

      <section class="info-section">
        <h3>Was bedeutet diese Zahl?</h3>

        <div class="legend">
          <div class="legend-box legend-good">
            &lt; 1000 ppm<br>
            Sehr gute<br>
            Luftqualität
          </div>

          <div class="legend-box legend-medium">
            1000–1400 ppm<br>
            Akzeptable<br>
            Luftqualität
          </div>

          <div class="legend-box legend-bad">
            &gt; 1400 ppm<br>
            Schlechte<br>
            Luftqualität
          </div>
        </div>
      </section>

      <nav class="bottom-nav">
        <a href="home.html" class="nav-item">
          <img src="./resources/assets/menu_home_rosa.png" alt="Home">
        </a>

        <a href="room.html" class="nav-item">
          <img src="./resources/assets/menu_rooms.png" alt="Räume">
        </a>

        <a href="profil.html" class="nav-item">
          <img src="./resources/assets/menu_profil.png" alt="Profil">
        </a>
      </nav>

    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/chart.js"></script>
  <script src="js/home.js"></script>

</body>
</html>
