<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Example Sender</title>
  </head>
  <body>
    <form id="dataForm">
      <!-- Feld für die Temperatur -->
      <label for="temp">Temperatur (°C):</label>
      <input type="number" id="temp" name="temp" step="0.1" required />
      
      <br><br> <!-- Kleine optische Trennung -->

      <!-- Feld für die Luftfeuchtigkeit -->
      <label for="hum">Luftfeuchtigkeit (%):</label>
      <input type="number" id="hum" name="hum" step="0.1" required />
      
      <br><br>

      <input type="submit" name="submit" value="Submit" />
    </form>
    <div id="message"></div>
    <script src="js/sender.js"></script>
  </body>
</html>
