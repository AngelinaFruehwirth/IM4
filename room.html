<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Zimmer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Host+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <main class="app-page">
    <section class="rooms-screen">

      <h1 class="rooms-title">Dein Zimmer</h1>

      <article class="room-card room-card-pink">

        <h2>Zimmername</h2>

        <label for="roomNameInput">Name bearbeiten</label>

        <input
          id="roomNameInput"
          class="room-field"
          type="text"
          placeholder="Zimmername"

        <button id="saveRoomBtn" class="add-room-btn">
          <span>Speichern</span>
        </button>

      </article>

      <nav class="bottom-nav">
        <a href="home.html" class="nav-item">
          <img src="./resources/assets/menu_home.png" alt="Home">
        </a>

        <a href="profil.html" class="nav-item">
          <img src="./resources/assets/menu_rooms.png" alt="Profil">
        </a>

        <a href="room.html" class="nav-item">
          <img src="./resources/assets/menu_profil_rosa.png" alt="Räume">
        </a>
      </nav>

    </section>
  </main>

  <script src="js/room.js"></script>

</html>
