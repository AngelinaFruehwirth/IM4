<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Registrieren</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Host+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <main class="page">

    <section class="form-card">

      <a href="index.html" class="close-button">×</a>

      <div class="cloud-circle">
        <img src="./resources/assets/Wolken_gut.png" alt="Freundliche Wolke">
      </div>

      <h1>
        Erstelle jetzt <br>
        dein <span>Konto.</span>
      </h1>

      <form id="registerForm">

        <input
          type="text"
          id="name"
          placeholder="Name"
        />

        <input
          type="email"
          id="email"
          placeholder="E-Mail"
          required
        />

        <input
          type="password"
          id="password"
          placeholder="Passwort"
          required
        />

        <button type="submit" class="btn btn-outline">
          Jetzt registrieren
        </button>

      </form>

    </section>

  </main>

  <script src="js/register.js"></script>

</body>
</html>
